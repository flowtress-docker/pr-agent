name: PR-Agent Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, edited]
  issue_comment:
    types: [created, edited]

concurrency:
  group: pr-agent-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      github.event.sender.type != 'Bot' &&
      github.event.pull_request.draft != true &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request) &&
      (github.event_name != 'issue_comment' || github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve URL and command
        id: args
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.issue.pull_request.html_url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PREV_BODY: ${{ github.event.changes.body.from }}
        run: |
          echo "url=$PR_URL" >> $GITHUB_OUTPUT

          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            echo "cmd=review" >> $GITHUB_OUTPUT
          else
            # Skip if comment was edited but command text didn't change
            OLD_CMD=""
            if [ -n "$PREV_BODY" ]; then
              read -r OLD_CMD __ <<< "${PREV_BODY#/}"
            fi
            read -r CMD CMD_ARGS <<< "${COMMENT_BODY#/}"
            if [ "$CMD" = "$OLD_CMD" ] && [ "$EVENT_ACTION" = "edited" ]; then
              echo "cmd=" >> $GITHUB_OUTPUT
              exit 0
            fi
            # Allowlist — only registered PR-Agent commands (synced with command2class in pr_agent/agent/pr_agent.py)
            case "$CMD" in
              review|describe|improve|ask|ask_line|update_changelog|add_docs|similar_issue|generate_labels) ;;
              *) CMD="" ;;
            esac
            echo "cmd=$CMD" >> $GITHUB_OUTPUT
            echo "cmd_args=$CMD_ARGS" >> $GITHUB_OUTPUT
          fi

      - name: Run PR-Agent
        if: steps.args.outputs.cmd != ''
        env:
          PR_URL: ${{ steps.args.outputs.url }}
          PR_CMD: ${{ steps.args.outputs.cmd }}
          PR_CMD_ARGS: ${{ steps.args.outputs.cmd_args }}
          MINIMAX__KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG__MODEL: minimax/MiniMax-M3
          CONFIG__MAX_MODEL_TOKENS: 200000
          CONFIG__GIT_PROVIDER: github
        run: |
          PYTHONPATH=. python -m pr_agent.cli \
            --pr_url "$PR_URL" \
            "$PR_CMD" $PR_CMD_ARGS
